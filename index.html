<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNS Spaced Repetition Tracker (Cloud Sync)</title>
    
    <!-- Load React and Tools -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load Firebase Realtime Infrastructure -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase API globally so React can consume it smoothly
        window.FirebaseAPI = {
            initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut,
            getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes addTopicGlow {
          0% { opacity: 0; transform: translateY(-20px); background-color: rgba(20, 184, 166, 0.4); }
          50% { background-color: rgba(20, 184, 166, 0.15); transform: translateY(0); }
          100% { opacity: 1; background-color: transparent; }
        }
        .animate-add-topic { animation: addTopicGlow 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideInFromRight {
          0% { opacity: 0; transform: translateX(40px) scale(0.98); }
          100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .animate-slide-in-right { animation: slideInFromRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideInFromLeft {
          0% { opacity: 0; transform: translateX(-40px) scale(0.98); }
          100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        .animate-slide-in-left { animation: slideInFromLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeInTab {
          0% { opacity: 0; transform: translateY(15px) scale(0.99); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in-tab { animation: fadeInTab 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeInBackdrop {
          0% { opacity: 0; backdrop-filter: blur(0px); }
          100% { opacity: 1; backdrop-filter: blur(4px); }
        }
        .animate-fade-in-backdrop { animation: fadeInBackdrop 0.3s ease-out forwards; }
        
        @keyframes scaleUpModal {
          0% { opacity: 0; transform: scale(0.9) translateY(20px); }
          100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-scale-up-modal { animation: scaleUpModal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeHeatmap {
          0% { opacity: 0; transform: scale(0.95); }
          100% { opacity: 1; transform: scale(1); }
        }
        .animate-fade-heatmap { animation: fadeHeatmap 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideFadeAgenda {
          0% { opacity: 0; transform: translateX(10px); }
          100% { opacity: 1; transform: translateX(0); }
        }
        .animate-agenda { animation: slideFadeAgenda 0.3s ease-out forwards; }

        @keyframes spinSlow {
          100% { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spinSlow 8s linear infinite; }

        @keyframes highlightPulse {
          0% { background-color: rgba(20, 184, 166, 0.6); transform: scale(1.02); box-shadow: 0 0 20px rgba(20, 184, 166, 0.4); z-index: 20; border-radius: 8px; }
          30% { background-color: rgba(20, 184, 166, 0.2); transform: scale(1.01); box-shadow: 0 0 10px rgba(20, 184, 166, 0.1); z-index: 20; border-radius: 8px; }
          100% { background-color: transparent; transform: scale(1); box-shadow: none; z-index: auto; border-radius: 0; }
        }
        .animate-highlight-row { 
          animation: highlightPulse 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
          position: relative;
        }

        /* --- GLOBAL INTERACTIVE POP & GLOW --- */
        button:not(:disabled), .interactive-pop {
          transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease, box-shadow 0.3s ease !important;
          will-change: transform, filter;
          position: relative;
        }
        button:not(:disabled):hover, .interactive-pop:hover {
          transform: scale(1.04) translateY(-2px) !important;
          filter: brightness(1.2) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3)) !important;
          z-index: 40 !important;
        }
        button:not(:disabled):active, .interactive-pop:active {
          transform: scale(0.96) translateY(0) !important;
          filter: brightness(0.9) !important;
          box-shadow: none !important;
        }

        /* Gentler scale for wide table rows and chart bars */
        tr.interactive-pop:hover, .chart-row.interactive-pop:hover {
          transform: scale(1.015) translateY(-2px) !important;
        }

        /* --- PROGRESS BAR ANIMATIONS --- */
        @keyframes shimmerBar {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
        .animate-shimmer-bar { animation: shimmerBar 2s linear infinite; }

        @keyframes neonTail {
          0%, 100% { width: 10px; opacity: 0.6; filter: blur(3px); transform: translateX(2px); }
          50% { width: 24px; opacity: 1; filter: blur(5px) brightness(1.4); transform: translateX(0); }
        }
        .animate-neon-tail { animation: neonTail 1.5s ease-in-out infinite; right: 0; }

        @keyframes spark1 {
          0% { transform: translate(0, -50%) scale(1); opacity: 1; }
          100% { transform: translate(-20px, -200%) scale(0); opacity: 0; }
        }
        @keyframes spark2 {
          0% { transform: translate(0, -50%) scale(1); opacity: 1; }
          100% { transform: translate(-25px, 100%) scale(0); opacity: 0; }
        }
        @keyframes spark3 {
          0% { transform: translate(0, -50%) scale(1.5); opacity: 1; }
          100% { transform: translate(-15px, -50%) scale(0); opacity: 0; }
        }
        .animate-spark-1 { animation: spark1 1s ease-out infinite; }
        .animate-spark-2 { animation: spark2 1.2s ease-out infinite; }
        .animate-spark-3 { animation: spark3 0.8s ease-out infinite; }

        /* --- 100% CHAOTIC EXPLOSION FLARE --- */
        @keyframes chaoticFlare {
          0% { filter: brightness(1); transform: scale(1) translate(0, 0); box-shadow: 0 0 0px rgba(16, 185, 129, 0); }
          10% { filter: brightness(3) contrast(1.5); transform: scale(1.05) translate(-3px, 2px); box-shadow: 0 0 50px rgba(16, 185, 129, 1), 0 0 20px #fff inset; }
          20% { transform: scale(1.02) translate(4px, -3px) skewX(2deg); filter: brightness(2.5); }
          30% { transform: scale(1.06) translate(-4px, -2px) skewX(-2deg); filter: brightness(4) hue-rotate(-15deg); }
          40% { transform: scale(0.98) translate(3px, 4px); filter: brightness(2); box-shadow: 0 0 60px rgba(20, 184, 166, 1), 0 0 25px #fff inset; }
          50% { transform: scale(1.03) translate(-2px, -3px); filter: brightness(3); box-shadow: 0 0 40px rgba(16, 185, 129, 0.8), 0 0 10px #fff inset; }
          60% { transform: scale(0.99) translate(2px, 2px); filter: brightness(1.5); }
          100% { filter: brightness(1.1); transform: scale(1) translate(0, 0); box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }
        }
        .animate-chaotic-flare { animation: chaoticFlare 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        @keyframes chaoticSweep {
          0% { transform: translateX(-100%) skewX(-30deg) scaleY(1); opacity: 0; }
          10% { opacity: 1; filter: brightness(3); }
          40% { transform: translateX(50%) skewX(-30deg) scaleY(2); opacity: 1; filter: brightness(4); }
          100% { transform: translateX(200%) skewX(-30deg) scaleY(1); opacity: 0; }
        }
        .animate-chaotic-sweep { animation: chaoticSweep 0.5s ease-out forwards; }

        @keyframes particleExplode {
          0% { transform: translate(0, 0) scale(2.5); opacity: 1; filter: brightness(3); }
          100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; filter: brightness(1); }
        }
        .animate-particle-explode { animation: particleExplode 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.8); }
    </style>
</head>
<body class="bg-slate-950">

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {

                Plus: <><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>,
                GripVertical: <><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></>,

                BellRing: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><path d="M4 2C2.8 3.7 2 5.7 2 8"/><path d="M22 8c0-2.3-.8-4.3-2-6"/></>,
                BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
                CalendarDays: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>,
                ChevronLeft: <polyline points="15 18 9 12 15 6"/>,
                ChevronRight: <polyline points="9 18 15 12 9 6"/>,
                ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
                FolderPlus: <><path d="M12 10v6"/><path d="M9 13h6"/><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></>,
                Check: <polyline points="20 6 9 17 4 12"/>,
                Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const CNS_DATA = {
          Anatomy: [
            "Introduction to CNS", "Spinal cord external features", "Cerebral hemisphere: sensory cortex",
            "Anterolateral System and Pain Pathways", "Short ascending tracts & dorsal column tracts",
            "Cerebral Hemisphere motor cortex", "Pyramidal & Extrapyramidal Tract",
            "Blood supply & lesions of spinal cord", "Basal Ganglia", "Cerebellum",
            "Brain Stem external features", "Fourth Ventricle and Reticular Formation",
            "Columns of Cranial Nerve Nuclei", "Blood Supply of the Brain Stem", "Cranial Cavity",
            "SCALP", "FACE", "Temporal and Infratemporal Fossae", "Trigeminal Nerve",
            "Pterygopalatine Fossa", "Autonomic Ganglia", "Fascia of the Neck", "Triangles of the Neck",
            "Suprahyoid muscles, cervical plexus & sympathetic chain", "Last Four Cranial Nerves",
            "Thalamus", "Hypothalamus and Third Ventricle", "Limbic System", "Cerebral White Matter",
            "Lateral ventricle, cerebral meninges & CSF circulation", "Cerebral Blood Supply",
            "Pharyngeal arches & Development of head & neck", "Development of face", "Development of nervous system"
          ],
          Physiology: [
            "Processing of signals in CNS", "Sensory Receptors and Sensory Coding",
            "Sensations Carried by the Spinothalamic Tract", "Pain and Pain control 1",
            "Pain and Pain control 2", "Sensations Carried by the Dorsal Column Tracts",
            "Somatosensory cortex", "Muscle Stretch Reflex 1,2", "Other Reflexes",
            "Motor Cortex Function", "Descending Motor Tracts functions", "Sensory and Motor Disorders",
            "Basal Ganglia", "Cerebellum", "Functions of Reticular Formation & Electrical activity of the Brain",
            "Sleep and Arousal", "Cerebral Dominance and Association Areas", "Speech, Language and Aphasia",
            "Functions of the Limbic System", "Hypothalamus", "Memory, Learning and Amnesia"
          ],
          Biochemistry: [
            "Energy Sources of the CNS", "Biochem. of Neurotransmitters and related CNS disorders",
            "Sources of Ammonia in the Brain & urea cycle", "Ammonia metabolism & Urea Cycle",
            "Hyperammonemia and Encephalopathy", "Inborn Errors of Amino Acid Metabolism",
            "Vitamin Deficiency and Metabolic Disorders", "One-carbon unit and Folate Metabolism"
          ],
          Histology: [
            "Histological Structure of the CNS (Neuroglia - Cerebral cortex)", "Histological Structure of Receptors",
            "Internal Structure of Spinal Cord - Gray Matter", "Spinal Cord Internal Structure: White matter",
            "Stretch Receptors structure", "Cerebellum", "Brainstem – Medulla", "Brainstem – Pons", "Midbrain"
          ],
          Pharmacology: [
            "Opioids", "Parkinsonism", "Sedatives and Hypnotics", "Anesthesia", "Epilepsy and Migraines",
            "Antidepressants", "Treatment of Meningitis", "Treatment of Neurodegenerative and Myelin Diseases",
            "Antipsychotics drugs", "Drug Abuse"
          ],
          Pathology: [
            "Neurodegenerative Diseases of the Basal Ganglia", "Cerebellar tumors",
            "Pathological Aspects of CNS Infections", "Neurodegenerative and Myelin Diseases",
            "CNS Trauma", "Cerebrovascular Diseases", "CNS Tumors"
          ],
          Microbiology: [
            "Infections Affecting Muscle Tone", "Bacterial Meningitis", "Fungal Meningitis",
            "Aseptic Meningitis and Poliomyelitis", "Viral Encephalitis", "Rabies"
          ],
          Parasitology: [
            "Amoebic Encephalitis", "Larvae affecting the Brain"
          ],
          Neurology: [
            "Clinical applications on motor & sensory lesions"
          ],
          Psychiatry: [
            "Dementia: types, causes & clinical considerations (clinical applications)"
          ]
        };

        const INTERVALS = [2, 5, 15];

        const getProgressColor = (percent) => {
          if (percent === 0) return 'bg-transparent';
          if (percent <= 34) return 'bg-gradient-to-r from-rose-500 to-orange-500 shadow-[0_0_12px_rgba(249,115,22,0.4)]';
          if (percent <= 68) return 'bg-gradient-to-r from-orange-500 to-lime-400 shadow-[0_0_12px_rgba(163,230,53,0.4)]';
          return 'bg-gradient-to-r from-lime-400 to-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.5)]';
        };

        const getTargetDate = (firstLearned, reps, targetIdx) => {
          if (!firstLearned) return null;
          let baseDate = new Date(firstLearned);
          let currentTarget = new Date(baseDate);
          
          for (let i = 0; i <= targetIdx; i++) {
            const gap = i === 0 ? INTERVALS[0] : INTERVALS[i] - INTERVALS[i-1];
            if (i > 0 && reps[i-1]) {
              const repDate = typeof reps[i-1] === 'string' ? new Date(reps[i-1]) : currentTarget;
              currentTarget = new Date(repDate);
            }
            currentTarget.setDate(currentTarget.getDate() + gap);
          }
          return currentTarget;
        };

        const Watermark = () => (
          <div className="fixed bottom-2 right-3 md:bottom-4 md:right-5 text-right text-[10px] text-slate-500/30 select-none pointer-events-none z-50 flex flex-col items-end">
            <span className="font-bold tracking-widest uppercase">Dr. Zeyad Robey</span>
            <span className="tracking-wider">Ain Shams University</span>
          </div>
        );

        // Advanced Serialization to prevent nested array limits in DB
        const sanitizeModuleData = (dataObj) => {
          const sanitized = {};
          if (!dataObj) return sanitized;
          
          Object.entries(dataObj).forEach(([subject, items]) => {
            let itemsArray = Array.isArray(items) ? items : (items && typeof items === 'object' ? Object.values(items) : []);
            
            sanitized[subject] = itemsArray.map((item, idx) => {
              const defaultReps = [false, false, false];
              let itemReps = (item && Array.isArray(item.reps)) ? [...item.reps] : [...defaultReps];
              while (itemReps.length < INTERVALS.length) itemReps.push(false);
              if (itemReps.length > INTERVALS.length) itemReps = itemReps.slice(0, INTERVALS.length);

              if (typeof item === 'string') {
                return { id: Math.random().toString(36).substr(2, 9), topic: item, firstLearned: '', reps: defaultReps };
              }
              
              if (item && typeof item === 'object') {
                return { 
                  id: item.id || Math.random().toString(36).substr(2, 9), 
                  topic: item.topic || 'Untitled', 
                  firstLearned: item.firstLearned || '', 
                  reps: itemReps 
                };
              }
              return null;
            }).filter(Boolean);
          });
          return sanitized;
        };

        const SpotlightCard = ({ children, className = "", onClick, spotlightColor = "rgba(45, 212, 191, 0.25)" }) => {
          const divRef = useRef(null);

          const handleMouseMove = (e) => {
            if (!divRef.current) return;
            const rect = divRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            divRef.current.style.setProperty('--mouse-x', `${x}px`);
            divRef.current.style.setProperty('--mouse-y', `${y}px`);
          };

          return (
            <div
              ref={divRef}
              onMouseMove={handleMouseMove}
              onClick={onClick}
              className={`relative overflow-hidden group/spotlight ${className}`}
            >
              <div 
                className="pointer-events-none absolute -inset-px z-0 opacity-0 transition-opacity duration-500 group-hover/spotlight:opacity-100 mix-blend-screen"
                style={{
                  background: `radial-gradient(100px circle at var(--mouse-x, 0) var(--mouse-y, 0), ${spotlightColor}, transparent 100%)`
                }}
              />
              {children}
            </div>
          );
        };

        const DigitalClock = () => {
          const [time, setTime] = useState(new Date());

          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          const timeString = time.toLocaleTimeString('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
          });

          const [timeVals, ampm] = timeString.split(' ');

          return (
            <SpotlightCard className="flex items-center gap-4 bg-slate-900/60 border border-slate-700/50 hover:border-teal-500/50 px-6 py-4 rounded-2xl shadow-[0_0_30px_rgba(20,184,166,0.1)] backdrop-blur-xl transition-all duration-300 hover:scale-[1.02] hover:-translate-y-1 cursor-default select-none w-full max-w-md mx-auto justify-center mb-10">
              <div className="flex items-baseline gap-2 relative z-10">
                <span className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-300 to-cyan-300 tabular-nums tracking-tight drop-shadow-md">
                  {timeVals}
                </span>
                <span className="text-xl md:text-2xl font-bold text-teal-500/80 uppercase tracking-widest">
                  {ampm}
                </span>
              </div>
            </SpotlightCard>
          );
        };

        const ModuleTracker = ({ module, onUpdate, onBack }) => {
          const trackerData = module.data || {};
          const [activeTab, setActiveTab] = useState(() => {
            const keys = Object.keys(trackerData);
            return keys.length > 0 ? keys[0] : null;
          });
          
          const [newTopicName, setNewTopicName] = useState('');
          const [heatmapYear, setHeatmapYear] = useState(2026);
          const [topicToDelete, setTopicToDelete] = useState(null);
          const [isAddingSubject, setIsAddingSubject] = useState(false);
          const [newSubjectName, setNewSubjectName] = useState('');
          const [addedTopicId, setAddedTopicId] = useState(null);
          
          const [agendaOffset, setAgendaOffset] = useState(0);

          const currentTabItems = Array.isArray(trackerData[activeTab]) ? trackerData[activeTab] : [];

          const heatMapData = useMemo(() => {
            const counts = {};
            Object.values(trackerData).flat().forEach(item => {
              if (item && item.firstLearned) {
                const firstDate = new Date(item.firstLearned);
                const formatFirst = `${firstDate.getFullYear()}-${String(firstDate.getMonth() + 1).padStart(2, '0')}-${String(firstDate.getDate()).padStart(2, '0')}`;
                counts[formatFirst] = (counts[formatFirst] || 0) + 1;

                (item.reps || []).forEach((repVal, idx) => {
                  if (repVal) {
                    let fmt;
                    if (typeof repVal === 'string') {
                      fmt = repVal; 
                    } else {
                      const target = getTargetDate(item.firstLearned, item.reps, idx);
                      fmt = `${target.getFullYear()}-${String(target.getMonth() + 1).padStart(2, '0')}-${String(target.getDate()).padStart(2, '0')}`;
                    }
                    counts[fmt] = (counts[fmt] || 0) + 1;
                  }
                });
              }
            });
            return counts;
          }, [trackerData]);

          const gridDays = useMemo(() => {
            const days = [];
            const startDate = new Date(heatmapYear, 0, 1);
            const endDate = new Date(heatmapYear, 11, 31);
            
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
              const formatted = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
              days.push({
                date: new Date(d),
                formatted: formatted,
                count: heatMapData[formatted] || 0
              });
            }
            return days;
          }, [heatMapData, heatmapYear]);

          const firstDayPadding = Array(gridDays[0].date.getDay()).fill(null);

          const agendaDate = useMemo(() => {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + agendaOffset);
            return d;
          }, [agendaOffset]);

          const agendaSummary = useMemo(() => {
            let items = [];
            let overdueCount = 0;
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const fmtAgenda = `${agendaDate.getFullYear()}-${String(agendaDate.getMonth() + 1).padStart(2, '0')}-${String(agendaDate.getDate()).padStart(2, '0')}`;
            const fmtToday = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            Object.entries(trackerData).forEach(([subject, topics]) => {
              if (!Array.isArray(topics)) return;
              topics.forEach(item => {
                if (!item || !item.firstLearned) return;

                const nextRepIdx = (item.reps || []).findIndex(r => !r);
                if (nextRepIdx === -1) return; 

                const targetDate = getTargetDate(item.firstLearned, item.reps, nextRepIdx);
                const fmtTarget = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, '0')}-${String(targetDate.getDate()).padStart(2, '0')}`;

                if (fmtTarget === fmtAgenda) {
                  items.push({
                    id: item.id,
                    subject,
                    topic: item.topic,
                    repNumber: nextRepIdx + 1
                  });
                }
                
                if (fmtTarget < fmtToday) {
                  overdueCount++;
                }
              });
            });

            return { items, overdueCount };
          }, [trackerData, agendaDate]);

          const nextRevision = useMemo(() => {
            let earliestDate = null;
            let nextTopic = null;

            Object.entries(trackerData).forEach(([subject, topics]) => {
              if (!Array.isArray(topics)) return;
              topics.forEach(item => {
                if (!item || !item.firstLearned) return;

                const nextRepIdx = (item.reps || []).findIndex(r => !r);
                if (nextRepIdx === -1) return; 

                const repDate = getTargetDate(item.firstLearned, item.reps, nextRepIdx);

                if (!earliestDate || repDate < earliestDate) {
                  earliestDate = repDate;
                  nextTopic = {
                    id: item.id,
                    subject,
                    topic: item.topic,
                    date: repDate,
                    repNumber: nextRepIdx + 1
                  };
                }
              });
            });

            return nextTopic;
          }, [trackerData]);

          const formatDate = (date) => {
            if (!date) return '';
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
          };

          const getUrgency = (date) => {
            if (!date) return 'none';
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = date - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays <= 0) return 'due';
            if (diffDays <= 3) return 'soon';
            return 'future';
          };

          const getAgendaLabel = () => {
            if (agendaOffset === 0) return "Today";
            if (agendaOffset === 1) return "Tomorrow";
            if (agendaOffset === -1) return "Yesterday";
            return formatDate(agendaDate);
          };

          const handleAgendaItemClick = (subject, topicId) => {
            setActiveTab(subject);
            
            setTimeout(() => {
              const targetRow = document.getElementById(`topic-row-${topicId}`);
              if (targetRow) {
                targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetRow.classList.remove('animate-highlight-row');
                void targetRow.offsetWidth; 
                targetRow.classList.add('animate-highlight-row');
              }
            }, 150);
          };

          const handleDateChange = (id, date) => {
            const newData = { ...trackerData };
            newData[activeTab] = currentTabItems.map(item => 
              item.id === id ? { ...item, firstLearned: date } : item
            );
            onUpdate({ ...module, data: newData });
          };

          const toggleRep = (id, repIndex) => {
            const newData = { ...trackerData };
            newData[activeTab] = currentTabItems.map(item => {
              if (item.id === id) {
                const newReps = [...(item.reps || [false, false, false])];
                
                if (newReps[repIndex]) {
                  newReps[repIndex] = false;
                } else {
                  const today = new Date();
                  const localDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                  newReps[repIndex] = localDate;
                }
                
                return { ...item, reps: newReps };
              }
              return item;
            });
            onUpdate({ ...module, data: newData });
          };

          const dragItem = useRef(null);
          const dragOverItem = useRef(null);
          const [isDragging, setIsDragging] = useState(false);
          const [dragHoverIndex, setDragHoverIndex] = useState(null);

          const handleDragStart = (e, index) => {
            dragItem.current = index;
            if (e.dataTransfer) {
              e.dataTransfer.effectAllowed = 'move';
            }
            setTimeout(() => setIsDragging(true), 0);
          };

          const handleDragEnter = (e, index) => {
            e.preventDefault();
            dragOverItem.current = index;
            if (dragItem.current !== index) {
              setDragHoverIndex(index);
            }
          };

          const handleSort = () => {
            if (dragItem.current === null || dragOverItem.current === null) return;
            if (dragItem.current === dragOverItem.current) return;

            const currentItems = [...currentTabItems];
            const draggedItemContent = currentItems[dragItem.current];
            
            currentItems.splice(dragItem.current, 1);
            currentItems.splice(dragOverItem.current, 0, draggedItemContent);
            
            const newData = { ...trackerData, [activeTab]: currentItems };
            onUpdate({ ...module, data: newData });
          };

          const handleDragEnd = () => {
            handleSort();
            setIsDragging(false);
            setDragHoverIndex(null);
            dragItem.current = null;
            dragOverItem.current = null;
          };

          const addNewTopic = (e) => {
            e.preventDefault();
            if (!newTopicName.trim()) return;
            
            const newId = Math.random().toString(36).substr(2, 9);
            const newItem = {
              id: newId,
              topic: newTopicName,
              firstLearned: '',
              reps: [false, false, false]
            };
            
            const newData = { ...trackerData, [activeTab]: [newItem, ...currentTabItems] };
            onUpdate({ ...module, data: newData });
            setNewTopicName('');
            
            setAddedTopicId(newId);
            setTimeout(() => setAddedTopicId(null), 800);
          };

          const deleteTopic = (id) => {
            const newData = { ...trackerData };
            newData[activeTab] = currentTabItems.filter(item => item.id !== id);
            onUpdate({ ...module, data: newData });
            setTopicToDelete(null);
          };

          const handleAddSubject = () => {
            if (!newSubjectName.trim() || trackerData[newSubjectName]) return;
            const newData = { ...trackerData, [newSubjectName]: [] };
            onUpdate({ ...module, data: newData });
            setActiveTab(newSubjectName);
            setIsAddingSubject(false);
            setNewSubjectName('');
          };

          return (
            <div className="min-h-screen text-slate-200 font-sans p-4 md:p-8 relative overflow-hidden selection:bg-teal-500/30">

              {/* Glowing Background Orbs */}
              <div className="absolute top-0 left-1/4 w-96 h-96 bg-teal-600/20 rounded-full mix-blend-screen blur-[128px] opacity-60 pointer-events-none z-0"></div>
              <div className="absolute bottom-0 right-1/4 w-[30rem] h-[30rem] bg-cyan-600/10 rounded-full mix-blend-screen blur-[128px] opacity-60 pointer-events-none z-0"></div>
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900/0 via-slate-950/50 to-slate-950 pointer-events-none z-0"></div>

              {/* Animated Content Wrapper */}
              <div className="animate-slide-in-right relative z-10 w-full">
                <header className="max-w-7xl mx-auto mb-8">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                          <button onClick={onBack} className="interactive-pop p-2 bg-slate-900/80 border border-slate-700 hover:bg-slate-800 active:scale-90 rounded-xl text-slate-400 hover:text-teal-400 transition-all shadow-sm">
                              <Icon name="ChevronLeft" size={20} />
                          </button>
                          <h1 className="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 flex items-center gap-3">
                            <Icon name="Brain" className="text-teal-400" size={32} />
                            {module.name} Repetition
                          </h1>
                      </div>
                      <p className="text-slate-400 mt-1 flex items-center gap-2 text-sm ml-[3.25rem]">
                        <Icon name="Network" size={16} className="text-cyan-400" />
                        Neural pathways active.
                      </p>
                    </div>
                    
                    <div className="bg-slate-900/80 backdrop-blur-md p-4 rounded-xl shadow-lg border border-slate-700/50 flex flex-wrap gap-4 items-center justify-center">
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-rose-500 animate-pulse shadow-[0_0_8px_rgba(225,29,72,0.6)]"></div>
                        <span className="text-[11px] font-bold text-slate-300 uppercase tracking-tight">Due Now</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.4)]"></div>
                        <span className="text-[11px] font-bold text-slate-300 uppercase tracking-tight">Soon (&lt;3d)</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full bg-teal-900/50 border border-teal-500/50"></div>
                        <span className="text-[11px] font-bold text-slate-300 uppercase tracking-tight">Future</span>
                      </div>
                      <div className="flex items-center gap-2 pl-2 border-l border-slate-700">
                        <div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]"></div>
                        <span className="text-[11px] font-bold text-slate-300 uppercase tracking-tight">Done</span>
                      </div>
                    </div>
                  </div>
                </header>

                <DigitalClock />

                <main className="max-w-7xl mx-auto">
                  {nextRevision && (
                    <SpotlightCard spotlightColor="rgba(45, 212, 191, 0.2)" className="mb-6 bg-gradient-to-r from-teal-900/40 via-slate-900/60 to-slate-900/40 border border-teal-500/30 rounded-2xl p-4 flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6 shadow-[0_0_20px_rgba(20,184,166,0.1)] backdrop-blur-md relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1 h-full bg-teal-500 shadow-[0_0_10px_rgba(20,184,166,0.8)] z-10"></div>
                      <div className="bg-teal-500/20 p-3 rounded-full text-teal-400 shrink-0 self-start md:self-auto relative z-10">
                        <Icon name="BellRing" size={24} className="animate-pulse" />
                      </div>
                      <div className="flex-1 relative z-10">
                        <h3 className="text-xs font-bold text-teal-400 uppercase tracking-wider mb-1">Up Next For Revision</h3>
                        <p className="text-slate-100 font-bold text-lg leading-snug">
                          {nextRevision.topic}
                        </p>
                        <div className="flex flex-wrap items-center gap-x-4 gap-y-2 mt-2 text-sm text-slate-400">
                          <span className="flex items-center gap-1.5 font-medium">
                            <Icon name="BookOpen" size={14} className="text-cyan-400"/> 
                            {nextRevision.subject}
                          </span>
                          <span className="flex items-center gap-1.5 font-medium text-teal-300 bg-teal-950/50 px-2 py-0.5 rounded border border-teal-500/20">
                            <Icon name="Calendar" size={14}/> 
                            {formatDate(nextRevision.date)}
                          </span>
                          <span className="bg-slate-800 text-slate-300 px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wide">
                            Rep #{nextRevision.repNumber}
                          </span>
                        </div>
                      </div>
                      <button 
                        onClick={() => handleAgendaItemClick(nextRevision.subject, nextRevision.id)} 
                        className="interactive-pop mt-2 md:mt-0 w-full md:w-auto px-5 py-2.5 bg-teal-600/20 hover:bg-teal-600/40 active:scale-95 text-teal-300 hover:text-teal-200 rounded-xl text-sm font-bold transition-all border border-teal-500/30 whitespace-nowrap relative z-10"
                      >
                        Go to Subject
                      </button>
                    </SpotlightCard>
                  )}

                  <SpotlightCard spotlightColor="rgba(16, 185, 129, 0.2)" className="mb-8 bg-gradient-to-r from-emerald-900/30 via-slate-900/60 to-teal-900/20 border border-emerald-500/30 rounded-2xl p-4 md:p-5 shadow-[0_0_20px_rgba(16,185,129,0.15)] backdrop-blur-md relative overflow-hidden flex flex-col">
                    <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)] z-10"></div>
                    
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 pb-4 border-b border-slate-800 gap-4 pl-3 relative z-10">
                      <div className="flex items-center gap-3">
                        <div className="bg-emerald-500/20 p-2 rounded-lg text-emerald-400 shrink-0">
                          <Icon name="Calendar" size={20} />
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-200 text-lg">Daily Agenda</h3>
                          {agendaOffset === 0 && agendaSummary.overdueCount > 0 && (
                            <p className="text-xs text-rose-400 font-semibold animate-pulse mt-0.5">
                              Warning: {agendaSummary.overdueCount} overdue topic(s) pending.
                            </p>
                          )}
                        </div>
                      </div>
                      
                      <div className="flex items-center gap-3 bg-slate-950/50 px-2 py-1.5 rounded-xl border border-slate-700/80 w-full sm:w-auto justify-between shadow-inner">
                        <button onClick={() => setAgendaOffset(o => o - 1)} className="interactive-pop p-1 hover:bg-emerald-900/50 active:scale-90 rounded-lg text-slate-400 hover:text-emerald-300 transition-all">
                          <Icon name="ChevronLeft" size={16}/>
                        </button>
                        <span className="text-sm font-bold w-24 text-center text-slate-200 select-none">
                          {getAgendaLabel()}
                        </span>
                        <button onClick={() => setAgendaOffset(o => o + 1)} className="interactive-pop p-1 hover:bg-emerald-900/50 active:scale-90 rounded-lg text-slate-400 hover:text-emerald-300 transition-all">
                          <Icon name="ChevronRight" size={16}/>
                        </button>
                      </div>
                    </div>

                    <div key={agendaOffset} className="animate-agenda max-h-56 overflow-y-auto pr-2 custom-scrollbar pl-3 relative z-10">
                      {agendaSummary.items.length === 0 ? (
                        <div className="text-center py-6">
                          <Icon name="CheckCircle2" size={32} className="mx-auto text-emerald-500/30 mb-2" />
                          <p className="text-slate-500 font-medium">No reviews scheduled for this day.</p>
                        </div>
                      ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                          {agendaSummary.items.map(item => (
                            <button 
                              key={`agenda-${item.id}`}
                              onClick={() => handleAgendaItemClick(item.subject, item.id)} 
                              className="interactive-pop text-left bg-slate-800/40 hover:bg-slate-700/60 border border-slate-700/50 p-3 rounded-xl transition-all flex flex-col justify-between group h-full active:scale-[0.98]"
                            >
                              <div className="mb-3">
                                <div className="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-1 flex items-center gap-1">
                                  <Icon name="BookOpen" size={12}/> {item.subject}
                                </div>
                                <div className="text-sm text-slate-200 font-medium leading-snug line-clamp-2">{item.topic}</div>
                              </div>
                              <div className="self-start bg-slate-900/80 px-2 py-1 rounded text-xs font-bold text-slate-400 border border-slate-700 group-hover:border-emerald-500/40 transition-colors">
                                Rep #{item.repNumber}
                              </div>
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  </SpotlightCard>

                  <div className="flex flex-wrap items-center gap-2 mb-6 border-b border-slate-800 pb-px overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
                    {Object.keys(trackerData).map(subject => (
                      <button
                        key={subject}
                        onClick={() => setActiveTab(subject)}
                        className={`interactive-pop px-4 py-2 text-sm font-semibold rounded-t-lg transition-all border-b-2 -mb-px whitespace-nowrap active:scale-95 ${
                          activeTab === subject 
                            ? 'text-teal-300 border-teal-400 bg-slate-800/80 shadow-[0_-2px_15px_rgba(20,184,166,0.15)]' 
                            : 'text-slate-500 border-transparent hover:text-slate-400 hover:bg-slate-800/50'
                        }`}
                      >
                        {subject}
                      </button>
                    ))}
                    <button 
                      onClick={() => setIsAddingSubject(true)}
                      className="interactive-pop px-3 py-2 text-slate-500 border-b-2 border-transparent hover:text-teal-400 hover:bg-slate-800/50 active:scale-95 rounded-t-lg transition-all -mb-px flex items-center gap-1"
                    >
                      <Icon name="Plus" size={16} /> New Subject
                    </button>
                  </div>

                  {activeTab && (
                    <div key={activeTab} className="animate-fade-in-tab w-full">
                      <SpotlightCard className="bg-slate-900/80 backdrop-blur-xl rounded-2xl shadow-2xl border border-slate-700/50 overflow-hidden">
                        <div className="relative z-10 p-4 bg-slate-950/50 border-b border-slate-800/80 flex flex-col md:flex-row gap-4 items-center justify-between">
                          <form onSubmit={addNewTopic} className="flex w-full md:w-auto gap-2">
                            <input 
                              type="text" 
                              placeholder={`Add topic to ${activeTab}...`} 
                              value={newTopicName}
                              onChange={(e) => setNewTopicName(e.target.value)}
                              className="px-4 py-2 rounded-lg bg-slate-950 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-500 w-full md:w-64 text-sm text-slate-200 placeholder-slate-500 transition-all"
                            />
                            <button className="interactive-pop bg-teal-600 hover:bg-teal-500 active:scale-90 text-white p-2 rounded-lg transition-all shrink-0 shadow-[0_0_10px_rgba(13,148,136,0.3)]">
                              <Icon name="Plus" size={20} />
                            </button>
                          </form>
                          <div className="flex items-center gap-1">
                            <div className="flex items-center gap-2 px-3 py-1 bg-teal-950/50 text-teal-300 border border-teal-500/20 rounded-full text-xs font-bold uppercase tracking-wider">
                              <Icon name="Clock" size={14} />
                              {currentTabItems.length} Topics
                            </div>
                          </div>
                        </div>

                        <div className="relative z-10 overflow-x-auto">
                          <table className="w-full text-left border-collapse min-w-max">
                            <thead>
                              <tr className="bg-slate-950/80 text-slate-400 uppercase text-[10px] tracking-wider font-bold">
                                <th className="px-6 py-4 w-12"></th>
                                <th className="px-6 py-4">Topic Name</th>
                                <th className="px-6 py-4 w-48">Learned On</th>
                                {INTERVALS.map((days, i) => (
                                  <th key={i} className="px-3 py-4 text-center">
                                    <span className="block opacity-60">Rep {i+1}</span>
                                    <span className="text-teal-400">+{days}d</span>
                                  </th>
                                ))}
                                <th className="px-4 py-4 w-16"></th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/60">
                              {currentTabItems.map((item, index) => {
                                const isDragged = isDragging && dragItem.current === index;
                                const isHovered = isDragging && dragHoverIndex === index && dragItem.current !== index;
                                const isMovingDown = dragItem.current !== null && dragItem.current < index;

                                let rowClass = `interactive-pop transition-all duration-300 ease-out group relative `;
                                if (addedTopicId === item.id) rowClass += 'animate-add-topic z-10 ';
                                if (!isDragging) rowClass += 'hover:bg-slate-800/40 ';

                                if (isDragged) {
                                  rowClass += 'opacity-40 bg-slate-900 scale-[0.98] border border-dashed border-teal-500/50 z-0 ';
                                } else if (isHovered) {
                                  rowClass += 'bg-slate-800/80 z-20 ';
                                }

                                let rowStyle = {};
                                if (isHovered) {
                                  rowStyle = {
                                    transform: isMovingDown ? 'translateY(-6px)' : 'translateY(6px)',
                                    boxShadow: isMovingDown 
                                      ? '0 6px 15px -3px rgba(20,184,166,0.15)' 
                                      : '0 -6px 15px -3px rgba(20,184,166,0.15)'
                                  };
                                }

                                return (
                                  <tr 
                                    key={item.id} 
                                    id={`topic-row-${item.id}`}
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, index)}
                                    onDragEnter={(e) => handleDragEnter(e, index)}
                                    onDragEnd={handleDragEnd}
                                    onDragOver={(e) => e.preventDefault()}
                                    className={rowClass}
                                    style={rowStyle}
                                  >
                                    <td className="px-4 py-4 text-center cursor-grab active:cursor-grabbing">
                                       <div className={`inline-flex items-center justify-center p-1.5 rounded-lg transition-all text-slate-500 hover:text-teal-400 hover:bg-teal-500/10 ${isDragging ? 'opacity-100 cursor-grabbing' : 'opacity-0 group-hover:opacity-100'}`}>
                                          <Icon name="GripVertical" size={20} />
                                       </div>
                                    </td>
                                    <td className="px-6 py-4">
                                      <div className="font-bold text-slate-200 text-lg leading-snug">
                                        {item.topic}
                                      </div>
                                    </td>
                                    <td className="px-6 py-4">
                                      <div className="relative">

                                          <div className="absolute right-1 top-1/2 w-3 h-3 bg-emerald-100 shadow-[0_0_15px_#d1fae5] rounded-full animate-particle-explode pointer-events-none z-30" style={{'--tx': '-70px', '--ty': '30px', animationDelay: '0.04s'}}></div>
                                          <div className="absolute right-1 top-1/2 w-2 h-2 bg-white shadow-[0_0_12px_#fff] rounded-full animate-particle-explode pointer-events-none z-30" style={{'--tx': '15px', '--ty': '80px', animationDelay: '0.12s'}}></div>
                                          <div className="absolute right-1 top-1/2 w-5 h-5 bg-teal-300 shadow-[0_0_25px_#5eead4] rounded-full animate-particle-explode pointer-events-none z-30" style={{'--tx': '90px', '--ty': '-20px', animationDelay: '0.06s'}}></div>

                                          <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shimmer-bar" style={{animationDuration: '3s', animationDelay: '0.8s'}}></div>
                                        </>

                                  </div>
                                  
                                  <div className="w-12 text-xs font-bold text-slate-500 text-right group-hover:text-teal-400 transition-colors">
                                    {completedReps} / {INTERVALS.length}
                                  </div>
                                </div>

                            })}
                          </div>
                        </SpotlightCard>
                      )}

                      {/* Activity Heatmap Section */}
                      <SpotlightCard className="mt-8 bg-slate-900/80 backdrop-blur-xl rounded-2xl shadow-2xl border border-slate-700/50 p-6 md:p-8 overflow-hidden">
                        <div className="relative z-10 flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 border-b border-slate-800 pb-4 gap-4">
                          <div className="flex items-center gap-3">
                            <Icon name="CalendarDays" className="text-emerald-400" size={24} />

                              Activity Heatmap

                        <div className="relative z-10 overflow-x-auto pb-2" style={{ scrollbarWidth: 'none' }}>

                              <div className="flex flex-col gap-[6px] text-[10px] text-slate-500 font-bold mt-[2px]">

                                    <div
                                      key={`day-${i}`}
