                              <div className="w-3 h-3 rounded-[2px] bg-emerald-900/60 border border-emerald-800/50"></div>
                              <div className="w-3 h-3 rounded-[2px] bg-emerald-700/80 border border-emerald-600/50"></div>
                              <div className="w-3 h-3 rounded-[2px] bg-emerald-500 border border-emerald-400/50"></div>
                              <div className="w-3 h-3 rounded-[2px] bg-emerald-400 border border-emerald-300/80"></div>
                              <span>More</span>
                            </div>
                          </div>
                        </div>
                      </SpotlightCard>

                    </div>
                  )}
                </main>
              </div>

              <footer className="max-w-7xl mx-auto mt-12 mb-8 text-center border-t border-slate-800/60 pt-8 text-slate-500 relative z-10">
                <p className="text-xs font-medium uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                  <Icon name="Activity" size={12} className="text-teal-400" />
                  Spaced Repetition Protocol • {INTERVALS.join(', ')} Days
                </p>
              </footer>

              {topicToDelete && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in-backdrop">
                  <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-scale-up-modal">
                    <h3 className="text-xl font-bold text-slate-200 mb-2">Delete Topic?</h3>
                    <p className="text-slate-400 mb-6">Are you sure you want to remove this topic? This action cannot be undone.</p>
                    <div className="flex gap-3 justify-end">
                      <button 
                        onClick={() => setTopicToDelete(null)}
                        className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold text-slate-300 hover:bg-slate-800 transition-colors"
                      >
                        Cancel
                      </button>
                      <button 
                        onClick={() => deleteTopic(topicToDelete)}
                        className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500/30 transition-colors"
                      >
                        Delete
                      </button>
                    </div>
                  </div>
                </div>
              )}
              
              {isAddingSubject && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in-backdrop">
                  <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-scale-up-modal">
                    <h3 className="text-xl font-bold text-slate-200 mb-4">Add New Subject</h3>
                    <input autoFocus type="text" value={newSubjectName} onChange={e => setNewSubjectName(e.target.value)} placeholder="e.g., Surgery, Radiology..." className="w-full px-4 py-2 mb-6 rounded-lg bg-slate-950 border border-slate-700 text-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500" />
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => { setIsAddingSubject(false); setNewSubjectName(''); }} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
                      <button onClick={handleAddSubject} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold bg-teal-600/20 text-teal-400 border border-teal-500/50 hover:bg-teal-600/40 transition-colors">Create</button>
                    </div>
                  </div>
                </div>
              )}

              <Watermark />
            </div>
          );
        };

        const MainApp = () => {
          // --- CLOUD SYNC STATE ENGINE ---
          const [user, setUser] = useState(null);
          const [db, setDb] = useState(null);
          const [modules, setModules] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [authInitialized, setAuthInitialized] = useState(false);
          
          const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-tracker-pro';

          // 1. Initialize Firebase Services
          useEffect(() => {
            let unsubscribeAuth;
            const initFirebase = async () => {
              // Wait a fraction of a second for the module script API to mount to window
              while (!window.FirebaseAPI) {
                await new Promise(r => setTimeout(r, 50));
              }

              const { initializeApp, getAuth, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseAPI;

              // Use Canvas environment config, or fallback to manual config for GitHub Pages
              const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyAxBM0MKvhFYBErsWw10pVNLLJNB3DQiYg",
                authDomain: "med-tracker-d9850.firebaseapp.com",
                projectId: "med-tracker-d9850",
                storageBucket: "med-tracker-d9850.firebasestorage.app",
                messagingSenderId: "333307897355",
                appId: "1:333307897355:web:bd31776e5392f9ac06c90e",
                measurementId: "G-YFKS009S18"
              };

              const app = initializeApp(firebaseConfig);
              const auth = getAuth(app);
              const database = getFirestore(app);
              setDb(database);

              // Canvas Preview Auto-Login using provided tokens if available
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                }
              } catch(e) { console.error("Authentication failed", e); }

              // Listen for authentication state (Google Login or Canvas Token)
              unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                 setUser(u);
                 setAuthInitialized(true);
                 if (!u) setIsLoading(false); // Stop loading if not logged in
              });
            };

            initFirebase();
            return () => { if (unsubscribeAuth) unsubscribeAuth(); };
          }, []);

          // Google Sign-In Handler
          const handleGoogleLogin = async () => {
            if (!window.FirebaseAPI) return;
            const { getAuth, GoogleAuthProvider, signInWithPopup } = window.FirebaseAPI;
            const auth = getAuth();
            const provider = new GoogleAuthProvider();
            try {
                setIsLoading(true);
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google Sign-In failed", error);
                setIsLoading(false);
                if (error.code === 'auth/configuration-not-found') {
                    alert("Firebase config missing. Please paste your secret keys into the code before uploading to GitHub!");
                } else {
                    alert("Sign-in popup was closed or failed. Please try again.");
                }
            }
          };

          const handleLogout = async () => {
            if (!window.FirebaseAPI) return;
            const { getAuth, signOut } = window.FirebaseAPI;
            await signOut(getAuth());
          };

          // 2. Real-Time Snapshot Listener
          useEffect(() => {
            if (!user || !db) return;
            setIsLoading(true);

            const { collection, onSnapshot, doc, setDoc } = window.FirebaseAPI;
            const modulesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'modules');

            const unsubscribe = onSnapshot(modulesRef, (snapshot) => {
              const loadedModules = [];
              snapshot.forEach(d => {
                const data = d.data();
                // We serialize data arrays as strings in Firestore to prevent array query limits
                let parsedData = {};
                try { parsedData = JSON.parse(data.dataString); } catch(e) { parsedData = data.data || {}; }
                loadedModules.push({
                  id: d.id,
                  name: data.name,
                  icon: data.icon,
                  createdAt: data.createdAt,
                  data: sanitizeModuleData(parsedData)
                });
              });

              // Seed Data if User has zero modules
              if (loadedModules.length === 0) {
                const freshData = sanitizeModuleData(CNS_DATA);
                const initMod = {
                  id: Math.random().toString(36).substr(2, 9),
                  name: 'CNS Module',
                  icon: 'Brain',
                  createdAt: new Date().toISOString(),
                };
                
                // Push initial module to cloud
                setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'modules', initMod.id), {
                  ...initMod,
                  dataString: JSON.stringify(freshData)
                });
              } else {
                setModules(loadedModules);
                setIsLoading(false);
              }
            }, (error) => {
              console.error("Cloud Sync Error:", error);
              setIsLoading(false);
            });

            return () => unsubscribe();
          }, [user, db, appId]);


          const [activeModuleId, setActiveModuleId] = useState(null);
          const [isCreatingModule, setIsCreatingModule] = useState(false);
          const [newModuleName, setNewModuleName] = useState('');
          const [moduleToDelete, setModuleToDelete] = useState(null);
          const fileInputRef = useRef(null);

          // 3. Cloud Database Write Handlers
          const handleUpdateModule = async (updatedModule) => {
            // Instant Optimistic UI Update so the app feels lightning fast
            setModules(modules.map(m => m.id === updatedModule.id ? updatedModule : m));

            if (!user || !db) return;
            const { doc, setDoc } = window.FirebaseAPI;
            const modRef = doc(db, 'artifacts', appId, 'users', user.uid, 'modules', updatedModule.id);
            
            // Serialize nested objects before cloud push
            const dataToSave = {
                id: updatedModule.id,
                name: updatedModule.name,
                icon: updatedModule.icon,
                createdAt: updatedModule.createdAt,
                dataString: JSON.stringify(updatedModule.data) 
            };
            
            await setDoc(modRef, dataToSave).catch(e => console.error("Sync error", e));
          };

          const handleCreateModule = async () => {
            if (!newModuleName.trim() || !user || !db) return;
            const { doc, setDoc } = window.FirebaseAPI;

            const newData = {};
            Object.keys(CNS_DATA).forEach(sub => newData[sub] = []);
            
            const newMod = { 
              id: Math.random().toString(36).substr(2, 9), 
              name: newModuleName, 
              icon: 'BookOpen', 
              createdAt: new Date().toISOString(), 
            };

            const dataToSave = { ...newMod, dataString: JSON.stringify(newData) };
            const modRef = doc(db, 'artifacts', appId, 'users', user.uid, 'modules', newMod.id);
            
            await setDoc(modRef, dataToSave);
            setNewModuleName('');
            setIsCreatingModule(false);
          };

          const handleDeleteModule = async (id) => {
            if (!user || !db) return;
            const { doc, deleteDoc } = window.FirebaseAPI;
            const modRef = doc(db, 'artifacts', appId, 'users', user.uid, 'modules', id);
            
            await deleteDoc(modRef);
            setModuleToDelete(null);
          };

          const handleExportData = () => {
            const blob = new Blob([JSON.stringify(modules, null, 2)], { type: "application/json" });
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(blob); 
            a.download = `med_tracker_backup.json`;
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a);
          };

          const handleImportData = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
              try {
                const imported = JSON.parse(event.target.result);
                if (Array.isArray(imported)) {
                    // Force loop to upload all imported modules to the cloud
                    const { doc, setDoc } = window.FirebaseAPI;
                    for(const mod of imported) {
                        const sanitizedData = sanitizeModuleData(mod.data);
                        const dataToSave = {
                            id: mod.id || Math.random().toString(36).substr(2, 9),
                            name: mod.name || 'Imported Module',
                            icon: mod.icon || 'BookOpen',
                            createdAt: mod.createdAt || new Date().toISOString(),
                            dataString: JSON.stringify(sanitizedData)
                        };
                        const modRef = doc(db, 'artifacts', appId, 'users', user.uid, 'modules', dataToSave.id);
                        await setDoc(modRef, dataToSave);
                    }
                }
              } catch (err) { console.error("Import failed", err); }
            };
            reader.readAsText(file); e.target.value = ''; 
          };


          // Show Full Screen Loading State while syncing
          if (!authInitialized || (isLoading && user)) {
            return (
              <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col items-center justify-center">
                <div className="animate-spin-slow text-teal-500 mb-6 bg-slate-900/50 p-4 rounded-full border border-teal-500/30 shadow-[0_0_30px_rgba(20,184,166,0.2)]">
                  <Icon name="Network" size={56} />
                </div>
                <p className="text-teal-400 font-bold uppercase tracking-[0.2em] animate-pulse">Syncing Cloud Neural Pathways...</p>
              </div>
            );
          }

          // Show Login Screen if not authenticated
          if (!user) {
            return (
              <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                <div className="absolute top-0 left-1/4 w-96 h-96 bg-teal-600/20 rounded-full blur-[128px] opacity-60 pointer-events-none z-0"></div>
                <div className="absolute bottom-0 right-1/4 w-[30rem] h-[30rem] bg-cyan-600/10 rounded-full blur-[128px] opacity-60 pointer-events-none z-0"></div>
                
                <SpotlightCard className="max-w-md w-full bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-2xl relative z-10 flex flex-col items-center text-center">
                    <div className="bg-teal-500/20 p-4 rounded-full text-teal-400 mb-6 shadow-inner border border-teal-500/30">
                        <Icon name="Activity" size={48} />
                    </div>
                    <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-2">
                        Med Tracker Pro
                    </h1>
                    <p className="text-slate-400 font-medium mb-8">
                        Sign in to sync your spaced repetition progress securely across all your devices.
                    </p>
                    
                    <button 
                        onClick={handleGoogleLogin}
                        className="interactive-pop w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 px-6 py-4 rounded-xl font-bold transition-all shadow-lg"
                    >
                        <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                                <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
                                <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>
                                <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/>
                                <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/>
                            </g>
                        </svg>
                        Continue with Google
                    </button>
                    <div className="mt-8 text-[10px] text-slate-500 uppercase tracking-widest font-bold flex flex-col gap-1 items-center">
                        <span>End-to-End Authentication</span>
                        <Icon name="Network" size={14} className="text-teal-500/50" />
                    </div>
                </SpotlightCard>
                <Watermark />
              </div>
            );
          }


          if (activeModuleId) {
            const activeModule = modules.find(m => m.id === activeModuleId);
            if (activeModule) {
              return (
                <ModuleTracker 
                  module={activeModule} 
                  onUpdate={handleUpdateModule} 
                  onBack={() => setActiveModuleId(null)} 
                />
              );
            }
          }

          return (
            <div className="min-h-screen bg-slate-950 text-slate-200 font-sans p-4 md:p-8 relative overflow-hidden">
              
              {/* Glowing Background Orbs */}
              <div className="absolute top-0 left-1/4 w-96 h-96 bg-teal-600/20 rounded-full blur-[128px] opacity-60 pointer-events-none z-0"></div>
              <div className="absolute bottom-0 right-1/4 w-[30rem] h-[30rem] bg-cyan-600/10 rounded-full blur-[128px] opacity-60 pointer-events-none z-0"></div>

              <div className="animate-slide-in-left max-w-7xl mx-auto relative z-10">
                <header className="mb-12 mt-4 flex flex-col md:flex-row md:items-center justify-between gap-6">
                  <div>
                    <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-2 flex items-center gap-4">
                      <Icon name="Activity" size={40} className="text-teal-400" />
                      Medical Modules
                    </h1>
                    <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 mt-2">
                      <p className="text-slate-400 text-lg">Select a module to continue your protocol.</p>
                      <div className="flex items-center gap-2 bg-emerald-950/40 border border-emerald-500/20 px-3 py-1 rounded-full w-max">
                        <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_8px_#34d399]"></div>
                        <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">
                          {user?.displayName ? `Synced: ${user.displayName.split(' ')[0]}` : 'Live Cloud Sync Active'}
                        </span>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-wrap items-center gap-3 self-center md:self-auto justify-end">
                    <button onClick={handleExportData} className="interactive-pop flex items-center gap-2 px-4 py-2 bg-slate-900/80 border border-slate-700 hover:bg-slate-800 active:scale-95 rounded-xl text-sm font-bold text-teal-400 transition-all shadow-sm">
                      <Icon name="Upload" size={16} /> Export
                    </button>
                    <button onClick={() => fileInputRef.current?.click()} className="interactive-pop flex items-center gap-2 px-4 py-2 bg-slate-900/80 border border-slate-700 hover:bg-slate-800 active:scale-95 rounded-xl text-sm font-bold text-emerald-400 transition-all shadow-sm">
                      <Icon name="Download" size={16} /> Import
                    </button>
                    <button onClick={handleLogout} className="interactive-pop flex items-center gap-2 px-4 py-2 bg-rose-500/10 border border-rose-500/30 hover:bg-rose-500/20 active:scale-95 rounded-xl text-sm font-bold text-rose-400 transition-all shadow-sm">
                      <Icon name="LogOut" size={16} /> Sign Out
                    </button>
                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportData} className="hidden" />
                  </div>
                </header>

                <DigitalClock />

                <main className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                  {modules.map(mod => {
                    const totalTopics = Object.values(mod.data || {}).flat().length;
                    return (
                      <SpotlightCard key={mod.id} onClick={() => setActiveModuleId(mod.id)} className="interactive-pop bg-slate-900/80 backdrop-blur-xl rounded-2xl p-6 border border-slate-700/50 hover:border-teal-500/50 transition-all shadow-xl hover:shadow-[0_0_30px_rgba(20,184,166,0.15)] group flex flex-col cursor-pointer min-h-[220px]">
                        <div className="flex justify-between items-start mb-4 relative z-10">
                          <div className="bg-teal-500/20 p-3 rounded-xl text-teal-400">
                            <Icon name="Brain" size={28} />
                          </div>
                          <div className="flex gap-2">
                            <button onClick={(e) => { e.stopPropagation(); setModuleToDelete(mod.id); }} className="p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 active:scale-90 transition-all opacity-0 group-hover:opacity-100 bg-slate-800 rounded-lg">
                              <Icon name="Trash2" size={18} />
                            </button>
                          </div>
                        </div>
                        <h3 className="text-2xl font-bold text-slate-200 mb-2 relative z-10">{mod.name}</h3>
                        <p className="text-slate-400 font-medium mb-6 flex items-center gap-2 relative z-10"><Icon name="BookOpen" size={16}/> {totalTopics} {totalTopics === 1 ? 'Total Topic' : 'Total Topics'} to Master</p>
                        <div className="mt-auto flex items-center gap-2 text-sm font-bold text-teal-400 group-hover:text-teal-300 transition-colors relative z-10">
                          Open Tracker <Icon name="ChevronRight" size={16} />
                        </div>
                      </SpotlightCard>
                    )
                  })}

                  <SpotlightCard onClick={() => setIsCreatingModule(true)} className="interactive-pop bg-slate-900/40 backdrop-blur-xl rounded-2xl p-6 border-2 border-dashed border-slate-700 hover:border-teal-400/60 transition-all hover:bg-slate-800/40 flex flex-col items-center justify-center min-h-[220px] group cursor-pointer">
                    <div className="relative z-10 flex flex-col items-center justify-center w-full h-full">
                      <div className="bg-slate-800 p-4 rounded-full text-slate-400 group-hover:text-teal-400 group-hover:bg-teal-500/20 transition-all mb-4">
                        <Icon name="FolderPlus" size={32} />
                      </div>
                      <h3 className="text-xl font-bold text-slate-400 group-hover:text-teal-300 transition-colors">Create New Module</h3>
                    </div>
                  </SpotlightCard>
                </main>
              </div>

              {isCreatingModule && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in-backdrop">
                  <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-scale-up-modal">
                    <h3 className="text-xl font-bold text-slate-200 mb-4">Create New Module</h3>
                    <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Module Name</label>
                    <input autoFocus type="text" value={newModuleName} onChange={e => setNewModuleName(e.target.value)} placeholder="e.g., Endocrine..." className="w-full px-4 py-2 mb-6 rounded-lg bg-slate-950 border border-slate-700 text-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500" />
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => setIsCreatingModule(false)} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
                      <button onClick={handleCreateModule} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold bg-teal-600/20 text-teal-400 border border-teal-500/50 hover:bg-teal-600/40 transition-colors">Create</button>
                    </div>
                  </div>
                </div>
              )}

              {moduleToDelete && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in-backdrop">
                  <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl animate-scale-up-modal">
                    <h3 className="text-xl font-bold text-rose-500 mb-2">Delete Module?</h3>
                    <p className="text-slate-400 mb-6">Are you sure you want to remove this module? This action cannot be undone.</p>
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => setModuleToDelete(null)} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
                      <button onClick={() => handleDeleteModule(moduleToDelete)} className="interactive-pop px-4 py-2 rounded-xl text-sm font-semibold bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500/30 transition-colors">Delete Permanently</button>
                    </div>
                  </div>
                </div>
              )}

              <Watermark />
            </div>
          )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
